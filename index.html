<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary meta -->
    <title>RetoPixel | Pixel Login Challenge</title>
    <meta
      name="description"
      content="RetoPixel is a pixel-inspired login interface built with pure HTML and CSS. No JavaScript required."
    >
    <meta name="author" content="TheAndree7u7">
    <meta name="theme-color" content="#090b1a">

    <!-- Open Graph / social preview -->
    <meta property="og:type"        content="website">
    <meta property="og:title"       content="RetoPixel | Pixel Login Challenge">
    <meta property="og:description" content="A pixel-inspired login interface built with pure HTML and CSS.">
    <meta property="og:image"       content="https://theandree7u7.github.io/RetoPixel/preview.png">
    <meta property="og:url"         content="https://theandree7u7.github.io/RetoPixel/">

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:title"       content="RetoPixel | Pixel Login Challenge">
    <meta name="twitter:description" content="A pixel-inspired login interface built with pure HTML and CSS.">

    <!-- Inline SVG favicon — no external request needed -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23090b1a'/><rect x='4'  y='4'  width='8' height='8' fill='%2300e5ff'/><rect x='20' y='4'  width='8' height='8' fill='%2300e5ff'/><rect x='12' y='12' width='8' height='8' fill='%237a8cff'/><rect x='4'  y='20' width='8' height='8' fill='%2300e5ff'/><rect x='20' y='20' width='8' height='8' fill='%2300e5ff'/></svg>"
    >

    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <!-- Skip-navigation link for keyboard/screen-reader users -->
    <a class="sr-only" href="#login-form">Skip to login form</a>

    <main class="layout">
      <section class="login-box" aria-labelledby="retopixel-title">
        <h1 id="retopixel-title">RetoPixel</h1>
        <p class="subtitle">A pixel-themed login challenge</p>

        <form id="login-form" action="#" method="post" novalidate>
          <div class="user-box">
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              spellcheck="false"
              required
              aria-required="true"
            >
            <label for="username">Username</label>
          </div>

          <div class="user-box">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              aria-required="true"
            >
            <label for="password">Password</label>
          </div>

          <button type="submit" class="submit-button">Sign in</button>
        </form>

        <noscript>
          <p class="noscript-notice" role="note">
            JavaScript is disabled — this page works without it.
          </p>
        </noscript>
      </section>
    </main>
  </body>
</html>
