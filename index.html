<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetoPixel | Pixel Login Challenge</title>
    <meta
      name="description"
      content="RetoPixel is a pixel-inspired login interface built with pure HTML and CSS."
    >
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="layout">
      <section class="login-box" aria-labelledby="retopixel-title">
        <h1 id="retopixel-title">RetoPixel</h1>
        <p class="subtitle">A pixel-themed login challenge</p>
        <form action="#" method="post">
          <div class="user-box">
            <input id="username" name="username" type="text" autocomplete="username" required>
            <label for="username">Username</label>
          </div>
          <div class="user-box">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            >
            <label for="password">Password</label>
          </div>
          <button type="submit" class="submit-button">Sign in</button>
        </form>
      </section>
    </main>
  </body>
</html>
