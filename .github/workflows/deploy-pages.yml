name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Pages API access
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          STATUS_CODE=$(curl -sS -o /tmp/pages-response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")

          if [ "${STATUS_CODE}" = "200" ]; then
            echo "Pages site is available."
          elif [ "${STATUS_CODE}" = "404" ]; then
            echo "::error::GitHub Pages is not configured for this repository. Enable Pages in repository settings and set Source to GitHub Actions."
            exit 1
          elif [ "${STATUS_CODE}" = "403" ]; then
            echo "::error::Workflow token cannot access Pages API. Verify workflow permissions include pages: write and repository settings allow GitHub Pages deployments."
            exit 1
          else
            echo "::error::Unexpected response from Pages API (status ${STATUS_CODE})."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
